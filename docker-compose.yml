version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./sistema_vacunacion_api/v1 # Cambia esto por la ruta real
    container_name: springboot_api
    env_file:
      - .env
    environment:
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
      build:
        context: ./frontend
        args:
          - VITE_API_URL=${VITE_API_URL}
      container_name: react_vite_frontend
      ports:
        - "3000:80"
      depends_on:
        - backend

volumes:
  postgres_data: