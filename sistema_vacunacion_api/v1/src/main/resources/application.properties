# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================
server.port=8080
server.servlet.context-path=/api/v1

resend.api.key=${RESEND_API_KEY}

# ==========================================
# CONFIGURACIÓN DE SEGURIDAD (JWT y rate limit)
# ==========================================
# Secreto con que se firman los JWT (mínimo 32 caracteres). Se define en el archivo .env
app.jwt.secret=${JWT_SECRET}
# Expiración diaria de los tokens: 24 horas en milisegundos
app.jwt.expiracion-ms=86400000
# Máximo de requests por minuto por IP (responde 429 al superarlo)
app.rate-limit.requests-por-minuto=60
# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS (Prototipo - H2 en memoria)
# ==========================================
# La base de datos se reiniciará en cada ejecución. 
spring.datasource.url=jdbc:h2:mem:protodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar la consola web de H2 para visualizar los datos 
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
# "update" crea o actualiza las tablas automáticamente basándose en tus entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Mostrar las consultas SQL en la consola (útil para debuggear)
spring.jpa.show-sql=false
# Formatear el SQL en la consola para que sea legible
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURACIÓN DE LOGS
# ==========================================
# Nivel de detalle de los logs del sistema
logging.level.root=INFO
# Ver exactamente qué parámetros se pasan a las consultas SQL
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

# ==========================================
# CONFIGURACIÓN DE JACKSON (JSON)
# ==========================================
# Evitar que la API falle si se envían campos en el JSON que no existen en tu DTO
spring.jackson.deserialization.fail-on-unknown-properties=false
# No incluir campos con valores nulos en las respuestas JSON
spring.jackson.default-property-inclusion=non_null