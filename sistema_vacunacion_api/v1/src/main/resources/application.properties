# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================
server.port=8080
server.servlet.context-path=/api/v1

resend.api.key=${RESEND_API_KEY}

# ==========================================
# CONFIGURACIÓN DE SEGURIDAD (JWT y rate limit)
# ==========================================
# Secreto con que se firman los JWT (mínimo 32 caracteres). Se define en el archivo .env
app.jwt.secret=${JWT_SECRET}
# Expiración diaria de los tokens: 24 horas en milisegundos
app.jwt.expiracion-ms=86400000
# Máximos de requests por minuto por IP, según grupo de rutas 
app.rate-limit.login-por-minuto=10
app.rate-limit.escritura-por-minuto=20
app.rate-limit.lectura-citas-por-minuto=50
app.rate-limit.general-por-minuto=60
# ==========================================
# ==========================================
# La base de datos se reiniciará en cada ejecución. 
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect



# ==========================================
# CONFIGURACIÓN DE LOGS
# ==========================================
# Nivel de detalle de los logs del sistema
logging.level.root=INFO
# Ver exactamente qué parámetros se pasan a las consultas SQL
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

# ==========================================
# CONFIGURACIÓN DE JACKSON (JSON)
# ==========================================
# Evitar que la API falle si se envían campos en el JSON que no existen en tu DTO
spring.jackson.deserialization.fail-on-unknown-properties=false
# No incluir campos con valores nulos en las respuestas JSON
spring.jackson.default-property-inclusion=non_null